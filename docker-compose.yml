version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: uimr-db
    environment:
      POSTGRES_DB: uimr_db
      POSTGRES_USER: uimr_admin
      POSTGRES_PASSWORD: uimr_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
