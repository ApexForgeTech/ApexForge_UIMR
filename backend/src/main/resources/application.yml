server:
  port: 8080

spring:
  application:
    name: uimr-backend

  # Default profile uses H2 for easy development
  datasource:
    url: jdbc:h2:file:./data/uimrdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:uimr-default-secret-key-change-in-production-must-be-at-least-256-bits-long-for-hs256}
  expiration: 86400000       # 24 hours
  refresh-expiration: 604800000  # 7 days

# Threat Intelligence API Keys
ti:
  virustotal:
    api-key: ${VT_API_KEY:}
    base-url: https://www.virustotal.com/api/v3
  abuseipdb:
    api-key: ${ABUSEIPDB_API_KEY:}
    base-url: https://api.abuseipdb.com/api/v2
  urlhaus:
    base-url: https://urlhaus-api.abuse.ch/v1
  hibp:
    api-key: ${HIBP_API_KEY:}
    base-url: https://haveibeenpwned.com/api/v3

# Telegram Bot
telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  default-chat-id: ${TELEGRAM_CHAT_ID:}

# SOAR Integration
soar:
  base-url: ${SOAR_BASE_URL:http://localhost:9000}
  api-key: ${SOAR_API_KEY:}

# Logging
logging:
  level:
    com.uimr: DEBUG
    org.springframework.security: DEBUG
